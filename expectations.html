<!DOCTYPE html>
<html lang="en">
    
<head>
    <link rel="stylesheet" href="css/exp.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <img src="img/cat.png">
    <div id="status">Ожидание...</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.1/signalr.js"></script>
    <script>
    const hubConnection = new signalR.HubConnectionBuilder()
        .withUrl("https://localhost:7271/screenAuthentificate")
        .build();

    hubConnection.on("ScreenAuthentificate", function (screen) {
        console.log("SignalR update:", screen);

            if (screen.isApproved) {
                localStorage.setItem("isBlocked", "false");
                localStorage.setItem("deviceCode", screen.deviceCode);
                localStorage.setItem("buildingId", screen.buildingId);
                localStorage.setItem("templateId", screen.templateId || "");
                
                document.getElementById("status").textContent =
                    "Экран подтвержден";

                const templateId = localStorage.getItem("templateId");

                    if (templateId === 1){
                        window.location.href = "index.html";
                    }
                    else {
                        window.location.href = "index2.html";
                    }
                        }
                    });



    async function start() {
        
        try {
            await hubConnection.start()
            console.log("SignalR connected")

            let isBlocked = localStorage.getItem("isBlocked")
            let id = localStorage.getItem("id")

            if (isBlocked === null) {

                id = crypto.randomUUID()

                localStorage.setItem("isBlocked", "true");
                localStorage.setItem("id", id)

                const response = await fetch("https://localhost:7271/Screens/create", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(id)
                });

                if (response.ok) {

                window.location.href = "expectations.html";

                } 
            }
        } catch (err) {
            console.error("SignalR error:", err)
            window.location.href = "error.html"
        }
    }

    start()
</script>
</body>
</html>
